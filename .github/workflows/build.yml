name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SyncTray.sln

      - name: Build
        run: dotnet build SyncTray.sln --no-restore --configuration Release

      - name: Publish
        run: dotnet publish src/SyncTray/SyncTray.csproj --no-build --configuration Release --output publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncTray
          path: publish/
